<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Minhas Tarefas</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.7/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container mt-5">

    <h1 class="mb-4">Minhas Tarefas</h1>

    <a href="{% url 'criar_tarefa' %}" class="btn btn-success mb-3">
        Nova Tarefa
    </a>

    <div class="card">
        <div class="card-body">

            <ul class="list-group">

                {% for tarefa in tarefas %}

                <li class="list-group-item d-flex justify-content-between align-items-center">

                    <div>
                        <strong>{{ tarefa.nome }}</strong>
                        <br>
                        <small>{{ tarefa.descricao }}</small>
                    </div>

                    <div>

                        <span class="badge bg-primary">
                            {{ tarefa.status }}
                        </span>

                        <a href="{% url 'editar_tarefa' tarefa.id %}" class="btn btn-warning btn-sm">
                            Editar
                        </a>

                        <a href="{% url 'deletar_tarefa' tarefa.id %}" class="btn btn-danger btn-sm">
                            Excluir
                        </a>

                    </div>

                </li>

                {% empty %}

                <li class="list-group-item">
                    Nenhuma tarefa cadastrada.
                </li>

                {% endfor %}

            </ul>

        </div>
    </div>

</div>

</body>
</html>
